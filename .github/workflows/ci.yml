name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --- BACKEND TESTING & LINTING ---
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Setup Python
        run: uv python install 3.14

      - name: Install Dependencies
        run: uv sync --dev

      - name: Run Linter (Ruff)
        run: uv run ruff check .
        continue-on-error: true # Report lint issues without blocking CI (optional, set to false to enforce styles)

      - name: Run Tests
        env:
          DATABASE_URL: sqlite:///./test_db.sqlite
          BETTER_AUTH_SECRET: ci_test_secret_key_placeholder
        run: uv run pytest

  # --- FRONTEND TESTING & LINTING ---
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Validate TypeScript Compilation
        run: npx tsc --noEmit

      - name: Verify Production Build
        env:
          NEXT_PUBLIC_API_URL: https://api-placeholder.com
          BETTER_AUTH_SECRET: ci_test_secret_key_placeholder
        run: npm run build

  # --- PRODUCTION DEPLOYMENT TRIGGER ---
  deploy:
    name: Deploy Services
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Status Note
        run: |
          echo "CI tests passed successfully."
          echo "Triggering Git-connected Vercel and Koyeb deployments automatically."
