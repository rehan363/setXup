name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # --- FRONTEND TESTING & LINTING ---
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Validate TypeScript Compilation
        run: npx tsc --noEmit

      - name: Verify Production Build
        env:
          NEXT_PUBLIC_API_URL: https://api-placeholder.com
          BETTER_AUTH_SECRET: ci_test_secret_key_placeholder
        run: npm run build

  # --- PRODUCTION DEPLOYMENT TRIGGER ---
  deploy:
    name: Deploy Frontend
    needs: [frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Status Note
        run: |
          echo "Frontend CI tests passed successfully."
          echo "Triggering Vercel production deployment."
